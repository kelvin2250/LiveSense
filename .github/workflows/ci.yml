name: CI

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate Python syntax
        run: |
          python -m py_compile consumer.py
          python -m py_compile producer.py
          python -m py_compile dashboard.py
          python -m py_compile onnx_inference.py
          python -m py_compile convert_onnx.py
